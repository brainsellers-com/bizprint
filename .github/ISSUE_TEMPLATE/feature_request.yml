name: 機能要望
description: 新機能や改善の提案をする
labels: ["type: enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        機能のご提案ありがとうございます。
        以下の項目をご記入ください。

  - type: textarea
    id: problem
    attributes:
      label: 解決したい課題
      description: どのような課題や不便がありますか？
      placeholder: "例: 印刷設定を毎回手動で変更する必要があり、手間がかかる"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 希望する解決策
      description: どのような機能や改善があると良いですか？
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 代替案
      description: 他に検討した方法があれば記述してください。
    validations:
      required: false

  - type: dropdown
    id: component
    attributes:
      label: コンポーネント
      description: 該当するコンポーネントを選択してください。
      options:
        - server-java（bizprint-server-java）
        - server-csharp（bizprint-server-csharp）
        - client（bizprint-client）
        - ci（GitHub Actions・CI）
        - docs（ドキュメント）
        - claude（Claude Code スキル・ルール）
        - sample（サンプルコード）
        - general（横断・その他）
        - 不明
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: 補足情報
      description: 参考資料やスクリーンショットなどがあれば添付してください。
    validations:
      required: false
