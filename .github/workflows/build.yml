name: Build

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - 'sample/**'
      - '.claude/**'
      - '.github/**'
      - '!.github/workflows/build.yml'
      - '*.md'
      - 'LICENSE'
      - '.editorconfig'
      - '.gitattributes'
      - '.gitignore'
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - 'sample/**'
      - '.claude/**'
      - '.github/**'
      - '!.github/workflows/build.yml'
      - '*.md'
      - 'LICENSE'
      - '.editorconfig'
      - '.gitattributes'
      - '.gitignore'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build on Windows Runner
    runs-on: [self-hosted, windows-public-runner]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Java version
        run: java -version

      - name: Build with Maven
        run: mvn clean install -B

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            bizprint-server-java/target/*.zip
            bizprint-server-java/target/*.tar.gz
            bizprint-server-csharp/target/*.zip
            bizprint-client/target/BatchPrint-OSS-Setup-*.exe
            bizprint-client/target/DirectPrint-OSS-Setup-*.exe
