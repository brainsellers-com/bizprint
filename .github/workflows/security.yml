name: セキュリティスキャン

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  semgrep:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v7

      - name: Run Semgrep
        run: semgrep scan --config auto --sarif --output semgrep-results.sarif
        env:
          SEMGREP_RULES: >-
            p/java
            p/csharp
            p/owasp-top-ten
            p/sql-injection
            p/xss
            p/xxe

      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: semgrep-sarif
          path: semgrep-results.sarif
          retention-days: 30

  gitleaks:
    name: Secret Detection (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        env:
          GITLEAKS_VERSION: "8.30.1"
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
          tar xzf gitleaks.tar.gz
          sudo mv gitleaks /usr/local/bin/

      - name: Run Gitleaks (PR - diff only)
        if: github.event_name == 'pull_request'
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: gitleaks detect --source . --log-opts="${PR_BASE_SHA}..${PR_HEAD_SHA}" --verbose

      - name: Run Gitleaks (push/schedule - latest commit)
        if: github.event_name != 'pull_request'
        run: gitleaks detect --source . --log-opts="-1" --verbose
