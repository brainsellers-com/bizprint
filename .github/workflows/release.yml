name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build and Release
    runs-on: [self-hosted, windows-public-runner]
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Check Java version
        run: java -version

      - name: Build with Maven
        run: mvn clean install -B

      - name: Determine if prerelease
        id: prerelease
        shell: pwsh
        env:
          TAG: ${{ github.ref_name }}
        run: |
          if ($env:TAG -match '-(alpha|beta|rc)') {
            "is_prerelease=true" | Out-File -Append -FilePath $env:GITHUB_OUTPUT
          } else {
            "is_prerelease=false" | Out-File -Append -FilePath $env:GITHUB_OUTPUT
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          prerelease: ${{ steps.prerelease.outputs.is_prerelease == 'true' }}
          files: |
            bizprint-server-java/target/*.zip
            bizprint-server-java/target/*.tar.gz
            bizprint-server-csharp/target/*.zip
            bizprint-client/target/BatchPrint-OSS-Setup-*.exe
            bizprint-client/target/DirectPrint-OSS-Setup-*.exe
